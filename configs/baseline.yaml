experiment_name: baseline_resnet18
seed: 42

data:
  archive_path: PKLot.tar
  metadata_dir: data/metadata
  extracted_root:
  image_size: 128
  num_workers: 0
  batch_size: 128
  max_train_samples:
  max_val_samples:
  max_test_samples:
  augmentation:
    horizontal_flip_prob: 0.5
    rotation_degrees: 10
    brightness_jitter: 0.15
    contrast_jitter: 0.15

training:
  epochs: 10
  learning_rate: 0.001
  weight_decay: 0.0001
  device: auto
  patience: 3

model:
  backbone: simple_cnn
  pretrained: false
  num_classes: 2

evaluation:
  metrics:
    - accuracy
    - precision
    - recall
    - f1
