experiment_name: baseline_resnet18
seed: 42
data:
  archive_path: PKLot.tar
  metadata_dir: data/metadata
  image_size: 128
  num_workers: 0
  batch_size: 32
  max_train_samples: 512
  max_val_samples: 128
  max_test_samples: 128
training:
  epochs: 1
  learning_rate: 0.001
  weight_decay: 0.0001
  device: auto
model:
  backbone: simple_cnn
  pretrained: false
  num_classes: 2
evaluation:
  metrics:
  - accuracy
  - precision
  - recall
  - f1
